{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/homepage.css' %}"
    />

    {% block css %}{% endblock %}

    <title>{% block title %}Base Title{% endblock %}</title>

    <style>
      .page-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }

      button, .btn {
        margin: 3px;
        cursor: pointer;
      }

      form {
        display: inline-block;
      }

      .comment {
        padding: 10px;
        margin-bottom: 10px;
        border-bottom: 1px solid #444;
      }
    </style>
  </head>

  <body>
    <div class="page-container">
      {% block content %}
      Base Block
      {% endblock %}
    </div>
  </body>
</html>
