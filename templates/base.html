{% load static %}
{% load i18n %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/homepage.css' %}"
    />

    {% block css %}{% endblock %}

    <title>{% block title %}{% trans "Base Title" %}{% endblock %}</title>

    <style>
      .page-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }

      button, .btn {
        margin: 3px;
        cursor: pointer;
      }

      form {
        display: inline-block;
      }

      .comment {
        padding: 10px;
        margin-bottom: 10px;
        border-bottom: 1px solid #444;
      }

      .language-form{
        float:right;
      }
    </style>
  </head>

  <body>

    <form class="language-form"
          action="{% url 'set_language' %}"
          method="post">
        {% csrf_token %}
        <input name="next" type="hidden" value="{{ request.get_full_path }}">

        <select name="language" onchange="this.form.submit()">
            <option value="en"
                {% if LANGUAGE_CODE == 'en' %}selected{% endif %}>
                English
            </option>

            <option value="de"
                {% if LANGUAGE_CODE == 'de' %}selected{% endif %}>
                Deutsch
            </option>
        </select>
    </form>

    <p>
        {% trans "Current language" %}: {{ LANGUAGE_CODE }}
    </p>

    <div class="page-container">
      {% block content %}
      {% trans "Base Block" %}
      {% endblock %}
    </div>

  </body>
</html>
