{% extends 'base.html' %}
{% load static %}

{% block title %}Payment{% endblock %}

{% block content %}
<h2>Payment</h2>
    {% if paid %}
        Danke für Ihre Bestellung, das Spiel finden Sie in Ihrer <a href="{% url 'game_list' %}">Library</a>.<br><br>
    {% else %}
        <form method="POST">
            {% csrf_token %}
            {{ payment_form.as_p }}
            <input type="hidden" id="shopping_cart_id" name="shopping_cart_id" value="{{ shopping_cart.id }}">
            <button type="submit" name="Pay">Pay</button>
        </form>
        <br>
        <a href="{% url 'home' %}">zurück zum Shop</a>
    {% endif %}
{% endblock %}
