{% extends "base.html" %}
{% load i18n %}

{% block content %}

<h2>{% trans "Edit User" %}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn" type="submit">
        {% trans "Save" %}
    </button>
</form>

<a class="btn" href="{% url 'cs_page' %}">
    {% trans "Back" %}
</a>

{% endblock %}
